aid: chef-robotics
name: Chef Robotics
description: >-
  Chef Robotics is a San Francisco, California physical-AI company building
  AI-enabled robots for high-mix food production. Its core product is an
  NSF-certified food-assembly robot that picks, scoops, and deposits a wide
  range of ingredients — fresh, cooked, IQF, sauces, leafy greens, mixed
  vegetables, and discrete piece items — into trays, burritos, wraps, pizza
  bases, and other containers on conveyor lines. The robots are powered by
  ChefOS, a proprietary Generalized Food Manipulation Model trained on tens of
  millions of real-world servings and tens of thousands of hours of production
  data, combining vision, decision-making, and robot control across a See /
  Think / Act stack with continuous Fleet Learning. Chef Robotics sells via a
  Robotics-as-a-Service (RaaS) model that bundles hardware, software updates,
  24/7 monitoring, and customer success. Deployed customers include Amy's
  Kitchen, Sunbasket, Cafe Spice, and Chef Bombay, with the fleet having
  produced 98+ million servings across the US, Canada, and Europe. The
  company is venture-backed (Kleiner Perkins, Avataar Ventures-led $43M
  Series A, Bloomberg Beta, Construct Capital) and serves frozen meals,
  fresh meals, co-manufacturing, D2C meal delivery, medically tailored
  meals, meatpacking, airline catering, and foodservice verticals. There is
  no public developer API, SDK, or open-source release for ChefOS — the
  platform is operated as a closed, fleet-managed service on Chef-owned
  hardware deployed inside customer facilities.
